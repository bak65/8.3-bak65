<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Câu Chuyện Vẻ Đẹp Riêng Biệt</title>
  <link href="https://fonts.googleapis.com/css2?family=Mali:ital,wght@0,400;0,600;0,700;1,400&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --shadow-soft: 0 0 15px rgba(255, 255, 255, 0.92), 0 0 30px rgba(255, 255, 255, 0.82);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: 'Mali', cursive;
      background: #ffffff;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    #story-container {
      width: min(95vw, 1200px);
      height: 90vh;
      position: relative;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }

    .title,
    .text,
    .triangle-text,
    .flower-text-prompt {
      text-shadow: var(--shadow-soft);
      line-height: 1.25;
      word-break: keep-all;
      overflow-wrap: normal;
      white-space: pre-line;
      hyphens: none;
      text-wrap: balance;
      max-width: 100%;
    }

    .layout-default {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: clamp(20px, 3vw, 40px);
    }

    .layout-default .image-col {
      flex: 4;
      display: flex;
      justify-content: flex-end;
      min-width: 0;
    }

    .layout-default .text-col {
      flex: 6;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      min-width: 0;
    }

    .layout-default .title {
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 700;
      margin-bottom: 24px;
      max-width: 92%;
    }

    .layout-default .text {
      font-size: clamp(1.25rem, 2.3vw, 2rem);
      font-weight: 600;
      color: #4b5563;
      max-width: 92%;
    }

    .layout-default .image-col img.standard-img {
      max-height: 42vh;
      max-width: 82%;
    }

    .layout-vertical {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding-inline: 12px;
    }

    .layout-vertical .title {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      margin-bottom: 18px;
      width: min(980px, 92%);
    }

    .layout-vertical .text {
      font-size: clamp(1.35rem, 2.8vw, 2.35rem);
      font-weight: 600;
      color: #4b5563;
      margin-top: 18px;
      width: min(900px, 88%);
    }

    .layout-vertical img.standard-img {
      height: 35vh;
      z-index: 1;
    }

    .layout-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 16px 15vh;
    }

    .layout-center .title {
      font-size: clamp(1.7rem, 3vw, 2.35rem);
      font-weight: 700;
      z-index: 2;
      width: min(980px, 92%);
    }

    .layout-center .text {
      font-size: clamp(1.15rem, 2.2vw, 1.8rem);
      font-weight: 600;
      color: #4b5563;
      margin-top: 16px;
      z-index: 2;
      width: min(900px, 88%);
    }

    .layout-center img.standard-img {
      height: 25vh;
      margin-top: 26px;
      opacity: 0.8;
      z-index: 1;
    }

    .layout-split {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: clamp(16px, 2vw, 24px);
      padding-inline: 10px;
    }

    .layout-split>* {
      min-width: 0;
    }

    .layout-split .title {
      flex: 1;
      font-size: clamp(1.9rem, 3.4vw, 2.7rem);
      font-weight: 700;
      text-align: right;
    }

    .layout-split img.standard-img {
      flex: 1.5;
      height: 45vh;
    }

    .layout-split .text {
      flex: 1;
      font-size: clamp(1.6rem, 3vw, 2.3rem);
      font-weight: 700;
      color: #4b5563;
      text-align: left;
    }

    .layout-triangle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding-inline: 14px;
    }

    .triangle-wrapper {
      position: relative;
      width: min(86vmin, 560px);
      aspect-ratio: 1 / 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .triangle-wrapper img.standard-img {
      width: 45%;
      height: auto;
      z-index: 1;
      display: block;
      position: relative;
    }

    .triangle-text {
      position: absolute;
      z-index: 2;
      text-align: center;
      font-weight: 700;
      font-size: clamp(1rem, 2.6vmin, 1.7rem);
      line-height: 1.3;
      width: 32%;
      min-width: 150px;
      max-width: 220px;
    }

    .triangle-text.t-top {
      top: -2%;
      left: 50%;
      transform: translateX(-50%);
      width: 78%;
      min-width: 0;
      max-width: none;
    }

    .triangle-text.t-left {
      bottom: 4%;
      left: -14%;
    }

    .triangle-text.t-right {
      bottom: 4%;
      right: -14%;
    }

    .cherry-blossom-container {
      position: absolute;
      width: 30vmin;
      height: 30vmin;
      max-width: 180px;
      max-height: 180px;
      z-index: 15;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 1s ease-out, transform 2s ease-in-out;
      cursor: pointer;
    }

    .rotating-flower {
      width: 100%;
      height: 100%;
      animation: spinFlower 12s linear infinite;
      filter: drop-shadow(0px 5px 15px rgba(255, 75, 145, 0.4));
    }

    @keyframes spinFlower {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .flower-text-prompt {
      position: absolute;
      top: 105%;
      width: 300px;
      text-align: center;
      font-size: clamp(1.15rem, 3vw, 1.7rem);
      color: #ff4b91;
      font-weight: 700;
      margin-top: 15px;
    }

    .zoom-out-effect {
      transform: scale(6);
      opacity: 0;
      transition: transform 2s cubic-bezier(0.5, 0, 0.2, 1), opacity 1.5s ease-in 0.5s;
    }

    img.standard-img {
      object-fit: contain;
      opacity: 0;
      transform: translateY(20px) scale(0.95);
      transition: opacity 1s ease-out, transform 1s ease-out;
    }

    img.standard-img.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    img.fullscreen-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 0;
      opacity: 0;
      transition: opacity 1.5s ease-out;
    }

    img.fullscreen-bg.show {
      opacity: 0.85;
    }

    .typing-cursor {
      display: inline-block;
      width: 3px;
      height: 1em;
      background-color: currentColor;
      margin-left: 5px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .pink-gradient-title {
      background: linear-gradient(45deg, #ff4b91, #ff7eb3, #ff007f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0px 0px 15px rgba(255, 255, 255, 0.9));
    }

    .floral-text {
      background: linear-gradient(45deg, #ff007f, #ff4d6d, #ff9966);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0px 0px 15px rgba(255, 255, 255, 0.9));
      font-size: clamp(1.2rem, 2.4vw, 1.8rem) !important;
      font-weight: 800;
    }

    #petal-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 5;
      overflow: hidden;
    }

    .falling-item {
      position: absolute;
      top: -50px;
      animation: fall linear forwards;
    }

    .rose-petal {
      background: linear-gradient(135deg, #ff1150, #ff758c);
      border-radius: 2px 20px 2px 20px;
      box-shadow: 0 0 10px rgba(255, 17, 80, 0.4);
    }

    .rose-leaf {
      background: linear-gradient(135deg, #4ade80, #16a34a);
      border-radius: 20px 2px 20px 2px;
      box-shadow: 0 0 10px rgba(22, 163, 74, 0.3);
    }

    @keyframes fall {
      0% {
        transform: translateY(0) rotate(0deg) scale(1);
        opacity: 0;
      }

      10% {
        opacity: 0.9;
      }

      100% {
        transform: translateY(110vh) rotate(720deg) scale(0.8);
        opacity: 0;
      }
    }

    #continue-prompt {
      position: fixed;
      bottom: 30px;
      right: 40px;
      font-size: 1.45rem;
      color: #9ca3af;
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
      animation: pulse 1.5s infinite;
      z-index: 1000;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.85);
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.05);
        opacity: 0.6;
      }
    }

    @media (max-width: 768px) {
      #story-container {
        width: 96vw;
        height: 92vh;
      }

      .layout-default,
      .layout-split {
        flex-direction: column;
        text-align: center;
      }

      .layout-default .title,
      .layout-default .text,
      .layout-vertical .title,
      .layout-vertical .text,
      .layout-center .title,
      .layout-center .text {
        width: 95%;
        max-width: 95%;
      }

      .layout-split img.standard-img {
        height: 25vh;
        order: 2;
        margin: 18px 0;
      }

      .layout-split .title {
        order: 1;
        text-align: center;
        font-size: clamp(1.6rem, 7vw, 2.1rem);
      }

      .layout-split .text {
        order: 3;
        text-align: center;
        font-size: clamp(1.3rem, 6vw, 1.9rem);
      }

      .layout-vertical img.standard-img {
        height: 25vh;
      }

      .layout-default .image-col img.standard-img {
        max-height: 25vh;
      }

      .layout-center {
        padding-bottom: 10vh;
      }

      .triangle-wrapper {
        width: min(92vw, 430px);
      }

      .triangle-text {
        width: 34%;
        min-width: 110px;
        font-size: clamp(0.95rem, 3.6vw, 1.2rem);
      }

      .triangle-text.t-left {
        left: -4%;
        bottom: 3%;
      }

      .triangle-text.t-right {
        right: -4%;
        bottom: 3%;
      }

      .triangle-text.t-top {
        top: 0;
        width: 84%;
      }

      .flower-text-prompt {
        width: 220px;
      }

      .floral-text {
        font-size: 1.35rem !important;
      }

      #continue-prompt {
        bottom: 20px;
        right: 20px;
        font-size: 1.15rem;
      }
    }
  </style>
</head>

<body>
  <div id="story-container"></div>
  <div id="continue-prompt">Chạm màn hình để tiếp tục ➔</div>

  <script>
    const slidesData = [
      {
        layout: 'default',
        title: 'Khi sinh ra',
        text: 'Bạn đã mang cho mình vẻ đẹp đặc biệt chỉ mình bạn có',
        titleColor: '#9333ea',
        image: 'https://raw.githubusercontent.com/nguyendangminh278-coder/chucmung8thang3/308436086c9b5981aa1ccc18f6d274dd46b505fd/Index/1%201.png'
      },
      {
        layout: 'vertical',
        title: 'Mỗi giây bạn lớn lên và mỗi trải nghiệm\nbạn gặp phải',
        text: 'Tạo nên những dấu ấn đặc biệt\ncho chính bạn',
        titleColor: '#f59e0b',
        image: 'https://raw.githubusercontent.com/nguyendangminh278-coder/chucmung8thang3/308436086c9b5981aa1ccc18f6d274dd46b505fd/Index/2%201.png'
      },
      {
        layout: 'split',
        title: 'Bạn không cần phải cố gắng\nthay đổi bản thân',
        text: 'theo những "chuẩn mực"\nnhất định',
        titleClass: 'pink-gradient-title',
        image: 'https://raw.githubusercontent.com/nguyendangminh278-coder/chucmung8thang3/308436086c9b5981aa1ccc18f6d274dd46b505fd/Index/3%201.png'
      },
      {
        layout: 'center',
        title: 'Bạn là chính mình và bạn có sắc đẹp\ncủa chính bạn,',
        text: 'đó là sự khác biệt mà chính bạn có',
        titleColor: '#ec4899',
        image: "https://raw.githubusercontent.com/nguyendangminh278-coder/ngdminh.278.portfolio/283f4c4815e7125a63f927cc01737abe66cab5c4/Pink%20and%20Purple%20Elegant%20International%20Women's%20Day%20Presentation.webp",
        fullScreenImage: true
      },
      {
        layout: 'default',
        title: 'Mọi chuẩn mực chỉ là nhất thời,',
        text: 'còn chính bạn được chọn "là chính bạn"',
        titleColor: '#3b82f6',
        image: 'https://raw.githubusercontent.com/nguyendangminh278-coder/chucmung8thang3/308436086c9b5981aa1ccc18f6d274dd46b505fd/Index/4%201.png'
      },
      {
        layout: 'center',
        title: 'Chúc các bạn nữ lớp PTKD 65',
        text: 'luôn yêu vẻ đẹp riêng biệt của bản thân',
        titleColor: '#e11d48',
        image: "https://raw.githubusercontent.com/nguyendangminh278-coder/ngdminh.278.portfolio/283f4c4815e7125a63f927cc01737abe66cab5c4/Pink%20and%20Purple%20Elegant%20International%20Women's%20Day%20Presentation.webp",
        fullScreenImage: true,
        textFloral: true,
        petals: true
      },
      {
        layout: 'triangle',
        image: '',
        isFlowerInteractive: true,
        flowerPrompt: 'Hãy mở bông hoa này',
        multiLines: [
          { text: 'Luôn hồn nhiên\ntinh nghịch', color: '#ec4899', class: 't-top' },
          { text: 'Luôn bay bổng\ntâm hồn', color: '#3b82f6', class: 't-left' },
          { text: 'Luôn hạnh phúc\nvới chính mình', color: '#8b5cf6', class: 't-right' }
        ]
      }
    ];

    function keepLastWords(text, count = 2) {
      if (!text) return text;
      const parts = text.split('\n');
      return parts
        .map((line) => {
          const words = line.trim().split(/\s+/);
          if (words.length <= count) return line;
          const head = words.slice(0, -count).join(' ');
          const tail = words.slice(-count).join('\u00A0');
          return `${head} ${tail}`.trim();
        })
        .join('\n');
    }

    slidesData.forEach((slide) => {
      if (slide.title) slide.title = keepLastWords(slide.title, 2);
      if (slide.text) slide.text = keepLastWords(slide.text, 2);
      if (slide.flowerPrompt) slide.flowerPrompt = keepLastWords(slide.flowerPrompt, 2);
      if (slide.multiLines) {
        slide.multiLines = slide.multiLines.map((line) => ({
          ...line,
          text: keepLastWords(line.text, 2)
        }));
      }
    });

    const container = document.getElementById('story-container');
    const promptEl = document.getElementById('continue-prompt');

    let currentSlide = 0;
    let currentTypingSpeed = 50;
    let isWaitingForClick = false;
    let isTransitioning = false;
    let typingQueue = [];
    let petalInterval;

    function startPetals() {
      if (document.getElementById('petal-container')) return;
      const petalBox = document.createElement('div');
      petalBox.id = 'petal-container';
      document.body.appendChild(petalBox);

      function spawn() {
        const item = document.createElement('div');
        const isLeaf = Math.random() > 0.7;
        item.className = `falling-item ${isLeaf ? 'rose-leaf' : 'rose-petal'}`;
        item.style.left = Math.random() * 100 + 'vw';
        const size = 15 + Math.random() * 20;
        item.style.width = size + 'px';
        item.style.height = size + 'px';
        item.style.animationDuration = 4 + Math.random() * 5 + 's';
        item.style.animationDelay = Math.random() * 1 + 's';
        petalBox.appendChild(item);
        setTimeout(() => item.remove(), 10000);
      }

      for (let i = 0; i < 15; i++) spawn();
      petalInterval = setInterval(spawn, 300);
    }

    function stopPetals() {
      clearInterval(petalInterval);
      const petalBox = document.getElementById('petal-container');
      if (petalBox) petalBox.remove();
    }

    function typeWriter(text, element, callback) {
      element.innerHTML = '';
      let i = 0;
      const cursor = document.createElement('span');
      cursor.className = 'typing-cursor';
      element.appendChild(cursor);

      function typing() {
        if (i < text.length) {
          if (text.charAt(i) === '\n') {
            cursor.insertAdjacentHTML('beforebegin', '<br>');
          } else {
            cursor.insertAdjacentText('beforebegin', text.charAt(i));
          }
          i += 1;
          setTimeout(typing, currentTypingSpeed);
        } else {
          cursor.remove();
          if (callback) callback();
        }
      }

      typing();
    }

    function processQueue() {
      if (typingQueue.length === 0) {
        isWaitingForClick = true;
        if (slidesData[currentSlide].isFlowerInteractive) {
          const ft = document.getElementById('dyn-flower-text');
          if (ft) ft.style.animation = 'pulse 1.5s infinite';
          promptEl.style.display = 'none';
        } else {
          promptEl.style.display = 'block';
          promptEl.style.opacity = 1;
        }
        return;
      }

      const task = typingQueue.shift();
      typeWriter(task.text, task.element, () => {
        setTimeout(processQueue, currentTypingSpeed === 5 ? 0 : 400);
      });
    }

    function buildSlideDOM(data) {
      container.className = `layout-${data.layout}`;
      container.innerHTML = '';
      typingQueue = [];

      const imgClass = data.fullScreenImage ? 'fullscreen-bg' : 'standard-img';
      const imgHTML = data.image ? `<img id="dyn-image" class="${imgClass}" src="${data.image}" alt="">` : '';
      const titleClass = data.titleClass ? data.titleClass : '';
      const titleColorStyle = data.titleColor ? `color: ${data.titleColor}` : '';

      if (data.layout === 'vertical') {
        container.innerHTML = `
          <div class="title ${titleClass}" id="dyn-title" style="${titleColorStyle}"></div>
          ${imgHTML}
          <div class="text" id="dyn-text"></div>
        `;
        typingQueue.push({ text: data.title, element: document.getElementById('dyn-title') });
        typingQueue.push({ text: data.text, element: document.getElementById('dyn-text') });
      } else if (data.layout === 'center') {
        container.innerHTML = `
          ${imgHTML}
          <div class="title ${titleClass}" id="dyn-title" style="${titleColorStyle}"></div>
          <div class="text ${data.textFloral ? 'floral-text' : ''}" id="dyn-text"></div>
        `;
        typingQueue.push({ text: data.title, element: document.getElementById('dyn-title') });
        if (data.text) {
          typingQueue.push({ text: data.text, element: document.getElementById('dyn-text') });
        }
      } else if (data.layout === 'split') {
        container.innerHTML = `
          <div class="title ${titleClass}" id="dyn-title" style="${titleColorStyle}"></div>
          ${imgHTML}
          <div class="text" id="dyn-text"></div>
        `;
        typingQueue.push({ text: data.title, element: document.getElementById('dyn-title') });
        typingQueue.push({ text: data.text, element: document.getElementById('dyn-text') });
      } else if (data.layout === 'triangle') {
        let flowerHTML = '';
        if (data.isFlowerInteractive) {
          flowerHTML = `
            <div id="cherry-blossom-btn" class="cherry-blossom-container" style="opacity: 0;">
              <svg viewBox="0 0 100 100" class="rotating-flower">
                <defs>
                  <g id="sakura-petal">
                    <path d="M 50 50 C 35 30, 25 15, 40 5 C 45 2, 48 5, 50 10 C 52 5, 55 2, 60 5 C 75 15, 65 30, 50 50 Z" fill="#ffb7c5" stroke="#ff7eb3" stroke-width="1"/>
                    <line x1="50" y1="50" x2="50" y2="25" stroke="#ff4b91" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="50" y1="50" x2="43" y2="32" stroke="#ff4b91" stroke-width="1" stroke-linecap="round"/>
                    <line x1="50" y1="50" x2="57" y2="32" stroke="#ff4b91" stroke-width="1" stroke-linecap="round"/>
                  </g>
                </defs>
                <use href="#sakura-petal" transform="rotate(0 50 50)" />
                <use href="#sakura-petal" transform="rotate(72 50 50)" />
                <use href="#sakura-petal" transform="rotate(144 50 50)" />
                <use href="#sakura-petal" transform="rotate(216 50 50)" />
                <use href="#sakura-petal" transform="rotate(288 50 50)" />
                <circle cx="50" cy="50" r="7" fill="#ff4b91" />
                <circle cx="50" cy="50" r="3" fill="#ffffff" />
              </svg>
              <div class="flower-text-prompt" id="dyn-flower-text"></div>
            </div>
          `;
        }

        container.innerHTML = `
          <div class="triangle-wrapper">
            ${imgHTML}
            ${flowerHTML}
            <div class="triangle-text t-top" id="dyn-t1" style="color: ${data.multiLines[0].color}"></div>
            <div class="triangle-text t-left" id="dyn-t2" style="color: ${data.multiLines[1].color}"></div>
            <div class="triangle-text t-right" id="dyn-t3" style="color: ${data.multiLines[2].color}"></div>
          </div>
        `;
        typingQueue.push({ text: data.multiLines[0].text, element: document.getElementById('dyn-t1') });
        typingQueue.push({ text: data.multiLines[1].text, element: document.getElementById('dyn-t2') });
        typingQueue.push({ text: data.multiLines[2].text, element: document.getElementById('dyn-t3') });
        if (data.isFlowerInteractive) {
          typingQueue.push({ text: data.flowerPrompt, element: document.getElementById('dyn-flower-text') });
        }
      } else {
        container.innerHTML = `
          <div class="image-col">${imgHTML}</div>
          <div class="text-col">
            <div class="title ${titleClass}" id="dyn-title" style="${titleColorStyle}"></div>
            <div class="text ${data.textFloral ? 'floral-text' : ''}" id="dyn-text"></div>
          </div>
        `;
        typingQueue.push({ text: data.title, element: document.getElementById('dyn-title') });
        typingQueue.push({ text: data.text, element: document.getElementById('dyn-text') });
      }

      const imgEl = document.getElementById('dyn-image');
      if (imgEl) {
        setTimeout(() => imgEl.classList.add('show'), 100);
      }

      const flowerEl = document.getElementById('cherry-blossom-btn');
      if (flowerEl) {
        setTimeout(() => {
          flowerEl.style.opacity = 1;
        }, 100);
      }
    }

    function playSlide(index) {
      if (index >= slidesData.length) {
        window.location.href = 'loinhan.html';
        return;
      }

      const data = slidesData[index];
      currentTypingSpeed = 50;
      isWaitingForClick = false;
      promptEl.style.opacity = 0;

      if (data.isFlowerInteractive) {
        promptEl.style.display = 'none';
      } else {
        promptEl.style.display = 'block';
      }

      if (data.petals) startPetals();
      else stopPetals();

      buildSlideDOM(data);
      container.style.opacity = 1;

      setTimeout(() => {
        processQueue();
      }, 400);
    }

    document.addEventListener('click', () => {
      if (isTransitioning) return;

      if (isWaitingForClick) {
        if (slidesData[currentSlide].isFlowerInteractive) {
          isTransitioning = true;
          promptEl.style.opacity = 0;

          const flowerContainer = document.getElementById('cherry-blossom-btn');
          const textPrompt = document.getElementById('dyn-flower-text');

          if (textPrompt) textPrompt.style.opacity = 0;
          document.querySelectorAll('.triangle-text').forEach((el) => {
            el.style.transition = 'opacity 0.5s';
            el.style.opacity = 0;
          });

          if (flowerContainer) {
            flowerContainer.classList.add('zoom-out-effect');
          }

          setTimeout(() => {
            window.location.href = 'loinhan.html';
          }, 2000);

          return;
        }

        isWaitingForClick = false;
        isTransitioning = true;
        promptEl.style.opacity = 0;
        container.style.opacity = 0;

        setTimeout(() => {
          currentSlide += 1;
          playSlide(currentSlide);
          isTransitioning = false;
        }, 500);
      } else {
        currentTypingSpeed = 5;
      }
    });

    window.onload = () => {
      setTimeout(() => {
        playSlide(currentSlide);
      }, 300);
    };
  </script>
</body>

</html>
